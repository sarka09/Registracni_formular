<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrační formulář</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="levy-panel">

      <div class="div-foto">
        <img class="foto" src="images/avatar.jpg" alt="avatar">
      </div>

      <h1>Nastavení účtu</h1>
      <p>Stačí pár minut a tvůj chytrý náramek bude připraven.</p>





    <div class="pravy-panel">


        <form action="" method="post">

          <div class="form-field">

            <div class="polozka">

              <label for="jmeno">Jméno</label>

              <input type="text" id="jmeno">

            </div>

            <div class="polozka">

              <label for="prijmeni">Příjmení</label>

              <input type="text" id="prijmeni">

            </div>

          </div>

          <div class="form-field">

            <label for="narozeni">Datum narození</label>

            <input type="date" id="narozeni">

          </div>

          <div class="form-field">

            <label for="email">Email</label>

            <input type="email" id="email">

          </div>>

          <div class="form-field">

            <label for="telefon">Telefon</label>

            <input type="tel" id="telefon">

          </div>

          <div class="form-field">

            <label for="checkbox">Souhlasím s <strong>obchodními podmínkami</strong></label>

            <input type="checkbox" id="checkbox">

          </div>

          <button class="button" type="submit">Registrovat</button>
        </form>



    </div>
  </div>

  </div>


</body>

</html>
